  text: 畢脫巾叩頭自摶各八十一過止次南向三拜言某甲今皈命南方無極太上靈寶天尊巳得道大聖衆至真諸君丈人三氣天君南鄉諸靈官今故立齊燒香然燈願以是功德照曜諸天普為帝王國主君官吏民受道法師父母尊親同學門人隱居山林學真道士諸賢者蠢飛蠕動跂行蜎息一切衆生普得免度十苦八難長居無為普得自然某家億曽萬祖囚徒先魂開諸光明咸得解脫轉入信根去離五道開度因緣死者長樂生世蒙恩天下太平道德興隆今故燒香自皈依師尊大聖衆至真之德得道之後升入無形與道合真畢叩頭摶頰各二十七過止次西向七拜言某甲今皈命西方無極太上靈寶天尊巳得道大聖衆至真諸君丈人七氣天君西鄉神仙諸靈官今故立齊燒香然燈願以是功德照曜諸天普為帝王國主君官吏民受道法師父母尊親同學門人隱居山林學真道士諸賢者蠢飛蠕動跂行蜎息一切衆生普得免度十苦八難長居無為普度自然某家億曽萬祖囚徒先魂開諸光明咸得解脫轉入信根去離五道開度因緣死者長樂生世蒙恩天下太平道德興隆今故燒香自皈依師尊大聖衆至真之德得道之後升入無形與道合真畢叩頭自傳各六十三過止次北向五拜言某甲今皈命北方無極太上靈寶天尊巳得道大聖衆至真諸君丈人五氣天君北鄉諸靈官今故立齊燒香然燈願以是功德照曜諸天普為帝王國主君官吏民受道法師父母尊親同學門人隱居山林學真道士諸賢者蠢飛蠕動跂行蜎息一切衆生普得免度十苦八難長居無為普度自然某家億曽萬祖囚徒先魂開諸光明咸得解脫轉入信根去離五道開度因緣死者長樂生世蒙恩天下太平道德興隆今故燒香自皈依師尊大聖衆至真之德得道之後升入無形與道合真畢叩頭摶頰各四十五過止次東北向一拜言某甲今皈命東北方無極太上靈寶天尊巳得道大聖衆至真諸君丈人梵氣天君東北鄉諸靈官今故立齊燒香然燈願以是功德照曜諸天普為帝王國主君官吏民受道法師父母尊親同學門人隱居山林學真道士諸賢者蠢飛蠕動跂行蜎息一切衆生普得免度十苦八難長居無為普度自然某家億曽萬祖囚徒先魂開諸光明咸得解脫轉入信根去離五道開度因緣死者長樂生世蒙恩天下太平道德興隆今故燒香自皈依師尊大聖衆至真之德得道之後升入無形與道合真畢叩頭搏頰各九過止次向東南一拜言某甲今皈命東南方無極太上靈寶天尊已得道大聖衆至真諸君丈人梵氣天君東南鄉諸靈官今故六齊燒香然燈願以是功德照曜諸天普為帝王國主君官吏民受道法師父母尊親同學門人隱居山林學真道士諸賢者蠢飛蠕動跂行蜎息一切衆生普得免度十苦八難長居無為普度自然某家億曽萬祖囚徒先魂開諸光明咸得解脫轉入信根去離五道開度因緣死者長樂生世蒙思天下太平道德興隆今故燒香自皈依師尊大聖衆至真之德得道之後升入無形與道合真畢叩頭摶頰各九過止次西南向一拜言某甲今皈命西南方無極太上靈寶天尊已得道大聖衆至真諸君丈人梵氣天君西南鄉諸靈官今故立齊燒香然燈願以是功德照曜諸天普為帝王國主君官吏民受道法師父母尊親同學門人隱居山林學真道士諸賢者蠢飛蠕動跂行蜎息一切衆生普得免度十苦八難長居無為普度自然某家億曽萬祖囚徒先魂開諸光明咸得解脫轉入信根去離五道開度因緣死者長樂生世蒙恩天下太平道德興𨺚今故燒香自皈依師尊大聖衆至真之德得道之後升入無形與道合真畢叩頭摶頰各九過止次向西北一拜言某甲今皈命西北方無極太上靈寶天尊巳得道大聖衆至真諸君丈人梵氣天君西北鄉諸靈官今故立齊燒香然燈願以是功德照曜諸天普為帝王國主君官吏民受道法師父母尊親同學門人隱居山林學真道士諸賢者蠢飛蠕動跂行蜎息一切衆生普得免度十苦八難長居無為普度自然某家億曽萬祖囚徒先魂開諸光明咸得解脫轉入信根去離五道開度因緣死者長樂生世蒙恩天下太平道德與隆今故燒香自皈依師尊大聖衆至真之德得道之後升入無形與道合真畢叩頭搏頰各九過止次向上方三十一拜言某甲今皈命上方無極太上靈寶天尊巳得道大聖衆至真諸君丈人三十二天帝君玉京玄都紫微上宫諸真人玉女神仙靈官今故立齊燒香然燈願以是功德照曜諸天普為帝王國主君官吏民受道法師父母尊親同學門人隱居山林學真道士諸賢者蠢飛蠕動跂行蜎息一切衆生普得免度十苦八難長居無為普度自然某家億曽萬祖囚徒先魂開諸光明咸得解脫轉入信根去離五道開度因緣死者長樂生世䝉恩天下太平道德興隆今故燒香自皈依師尊大聖衆至真之德得道之後升入無形與道合真畢叩頭自搏各二百八十八過止次向下方一十二拜言某甲今皈命下方無極太上靈寶天尊巳得道大聖衆至真諸君丈人九壘土皇四司五帝十二仙官五嶽四瀆九宫真人神仙玉女無極世界地祇諸靈官今故立齊燒香然燈願以是功德照曜無極世界長夜之府九幽之中普為帝王國主君官吏民受道法師父母尊親同學門人隱居山林學真道士諸賢者及臣家億曽萬祖長夜死魂先身所犯天禁地戒罪惡纒結死受宿對往返塗炭因緣不絶流曵五苦長徒無脫乞今燒香然燈懴謝以自拔贖光明普照長夜之府九幽地獄解出幽魂罪根散釋三官九署不見拘閉開度升遷得入福堂去離惡道𢘆居善門生世歡樂普天安寧今故燒香自皈依師尊大聖衆至真之德得道之後升入無形與道合真畢叩頭自摶各一百二十過止飛天神人曰明真科品凡拔度億曽萬祖宿罪惡根行道如法則九幽開通長徒死魂身受光明大慈之道無量福田夫屈折禮拜叩頭自摶以施遜謝之辭而心丹意盡精誠苦到自然感徹身體疲弊不任牽曵自可心拜於天真無煩於屈折苟外飾而心怠亦勞形於禮拜爾信向之士心口相應捻香感願巳徹諸天生死罪對靡不散釋然此功德甚重三界所稱福德巍巍難可載焉太上道君稽首上白天尊今聞飛天神人說罪福緣對拔度上品陳請禮謝解釋宿根來生男女當受其恩普得開度身入光明為善如是復有餘方不審天有重灾國祚不安星宿越錯四氣失常兵疫疾厄帝王不寧毒癘流布天人死傷當作何法以禳其灾拔度厄難解諸不祥願垂教㫖可得修行和天安地佐國立功如見訓敕則恩布十方國祚安鎮帝王興隆天下歡泰福慶無窮來世一切普聞法音於是天尊告飛天神人而說罪福緑對拔度上品救度國土灾疾危厄灾難未盡者便可盡為對太上道君一一說之使未見者見未聞者聞普教一切令衆見光明於是說之善受訣言飛天神人曰長夜之府九幽玉匱明真科法帝王國土疾疹兵寇危急厄難當丹書靈寶真文五篇於中庭五案置五方一案請一篇真文以上金五兩一兩作一龍五兩分作五龍以鎮五篇文上又以五色紋繒之信以鎮五帝有灾之身隨年齎紫文之繒拔度身命安鎮國祚禳解天灾明星列宿春則然九燈亦可九十燈亦可九百燈夏則然三燈亦可三十燈亦可三百燈秋則然七燈亦可七十燈亦可七百燈冬則然五燈亦可五十燈亦可五百燈四季之月則然燈十二亦可百二十燈亦可千二百燈又安一長燈長九尺上安九燈置中央以照九幽長夜之府明逹大法師於中央披頭散結依訣塗炭六時請謝中庭行事若清信男女佐國祈請當於門外散髮塗炭陳情春則九日九夜夏則三日三夜秋則七日七夜冬則五日五夜四季則十二日十二夜羅列光明照曜諸天無極世界長夜之中則九幽開清光入無窮三景朗照天地安寧星宿復位四時和平萬灾咸消兵疾不行天人觀泰國祚興隆行道日竟當燒真文散之青煙飛天神人曰法師從地戶入燒香繞香燈三過還東向立叩齒三十六通發爐次發爐無上三天玄元始三氣太上道君召出臣身中三五功曹左右官使者左右捧香驛龍騎吏侍香金童傳言玉女五帝直符各三十六人出出者嚴裝關啓土地里域四面真官臣今正爾燒香行道願使十方正真之氣入臣身中所啓速過徑御太上無極大道至尊玉皇上帝御前次各稱法位三洞大法師小兆臣某上啓虛無自然元始天尊無極大道太上道君太上老君髙上玉皇巳得道大聖衆至真諸君文人三十二天帝玉虛上帝玉帝大帝東華南極西靈北真玄都玉京金闕七寶玄臺紫微上宫靈寶至真明皇道君臣宿命因緣生值法門玄真啓拔得入信根先師盟授三寶神經法應度人九萬九千位登至真臣祖世以來逮及今身生值經教常居福中功微德少未能自仙志竭皈命佐國立功今國土失和兵病並興隂陽否激星宿錯行灾疾重厄其事云云或慮帝王受天禪祚總監兆民未周施惠廣潤十方使天人豐沃欣國太平而行無歌詠路致吞聲故三景昏錯大灾流行帝王憂愓兆民無寧今謹依大法披露真文燒香然燈照曜諸天信誓自效行道謝殃願上請天仙兵馬九億萬騎地仙兵馬九億萬騎真人兵馬九億萬騎飛仙兵馬九億萬騎神人兵馬九億萬騎日月兵馬九億萬騎星宿兵馬九億萬騎九宫兵馬九億萬騎五帝兵馬九億萬騎五嶽兵馬九億萬騎三河四海兵馬九億萬騎三十二天監齊直事侍香金童散花玉女五帝直符各二十二人傳言奏事飛龍騎吏等一合來下監臨齊堂捻香願念應口上徹須行道事竟有功勤者言功仙官次三捻上香三洞大法師小兆臣某今故立直初捻上香願以是功德為帝王國主君臣吏民普天七世父母去離憂苦上升天堂今故燒香皈身皈神皈命大道臣首體投地皈命太上三尊願以是功德歸流普天七世父毋乞免離十苦八難上升天堂衣食自然長居無為今故燒香自皈依師尊大聖衆至真之德得道之後升入無形與道合真臣今故立直二捻上香願以是功德為帝王國主君官吏民受道法師父母尊親同學門人隱居山林學真道士諸賢者願各得其道皈身皈神皈命大道臣首體投地皈命太上三師願以是功德歸流帝主國主君官吏民受道法師父毋尊親同學門人隱居山林學真道士諸賢者願各得其道安居無為長享福祚今故燒香自皈依師尊大聖衆至尊之德得道之後升入無形與道合真臣今故立直三捻上香願以是功德令臣得仙道友九種姻親國中同法學士天下民人及蝖飛蠢動跂行蜎息一切衆生巳生夫生並乞成就皈身皈神皈命大道臣首體投地皈命太上三尊願以是功德歸流臣身令得仙度終入無為與四大合德天下人民一切衆生並得免離十苦八難五毒水火賊疫鬼害灾厄之中國土安寧天下興隆今故燒香自皈依師尊大聖衆至真之德得道之後升入無形與道合真次東向九拜言曰天地否激隂陽相刑四時失和灾害流生星宿錯綜以告不祥國土擾亂兵病並行帝王憂傷兆民無寧謹依大法披露真文皈命東方無極太上靈寶天尊巳得道大聖衆至真諸君丈人九氣天君東鄉諸靈官令故立齊披心露形引求自剋為國謝殃燒香然燈照曜諸天下映元拯長夜之中九幽之府開諸光明願以是功德為帝王國主君官吏民解灾却患三景復位五行順常兵止病愈國祚興隆兆民歡泰人神安寧今故燒香皈身皈神皈命師尊大聖衆至真之德得道之後升入無形與道合真叩頭自搏八十一過止次南向三拜言曰天地否激隂陽相刑四時失和灾害流生星宿錯綜以告不祥國土擾亂兵病並行帝王憂傷兆民無寧謹依大法披露真文皈命南方無極太上靈寶天尊已得道大聖衆至真諸君丈人三氣天