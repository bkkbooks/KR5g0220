  text: 洞玄靈寳長夜之府九幽玉匱明眞科亦六元始天尊時在香林園中與七千二百四十童子俱教化諸法度身威光於是天尊放五色光明徹照諸天長樂福堂十方无極世界地獄是時童子俱在一處見諸天福堂男女善人逍遥無爲衣食自然普見无極世界地獄之中囚徒謫役餓鬼死魂祼身無衣頭脚鎻械足立刀山身負鐵杖大小相牽五體爛壞無復人形飢則食炭渇飲火精流曳三塗八難之中爾時上智童子閉眼伏地稽首上白天尊今日侍座得見諸大地獄之中善惡命根心振意懼五神悲惶敢縁天慈曲逮無窮欲有所問惟願天尊有以開悟愚矇之心直垂訓厲敷演玄教令衆得明來世之人不見科戒方當履向五濁毒湯遭難遇害不能度身是男是女皆當如今所見地獄囚徒餓鬼謫役之魂億劫塗炭而不得還無知受對甚可哀傷願使禁戒明眞科律以爲來生人世作善因縁世世可得蒙此大福免離苦根度脫三塗上昇天堂元始天尊曰善哉善哉子之所問要乎深矣長夜之府九幽玉匱明眞科律具說罪褔宿命因緣善惡報應解㧞苦根戒人治行身入光明逺惡就善終歸福門其法弘普廣度天人生死蒙惠兔脫八難身超三界受慶自然世世歡樂享祚無窮今以相告宻遵之焉上智童子前進作禮長跪稽首上白天尊言不審今所普見諸天福堂及无極世界地獄之中善惡報應悉何因縁所從而來生世何修而得飛行逍遥上清位豋髙仙生世何縁身得尸解滅度無爲生世何縁死而不休後還更生生世何縁死𥙷天官身有光明生世何縁死生諸天爲太上之賔生世何縁死無拘閉與五帝交㳺生世何縁死得受號爲地工靈神生世何縁死爲衆聖策駕雲中生世何縁死昇福堂衣食自然生世何縁死昇南宮即生人中生世何縁死入地獄長夜無窮生世何緣死受楚毒萬痛加身生世何緣死不得食餓鬼之中生世何縁死受分離破裂身形生世何緣死充囚徒流曵三官生世何縁死入鑊湯無復人身生世何緣死循劔樹風刀徃還生世何縁頭面焦燎頭戴火山生世何縁身無衣服鐵杖負身生世何縁身被髠截負石無閑生世何縁死受鎻械幽閉三光生世何縁驅馳苦極食息無寧生世何縁㧞岀其舌鐵錐刺之生世何縁死汲溟波以灌四瀆今見地獄之中有如此軰生何所犯而受斯對魂神苦痛乃至如此不審幾年當得解脫解脫之日當生六畜爲還人中願爲分别解說命根爲說來生作善因縁如蒙開悟即受聖恩天尊於是命召十方飛天神人披長夜之府九幽玉匱出明眞科律以度童子是時諸天大聖无極尊神神仙玉女無鞅數衆不可勝計同時詣座天洒香花神龍伎樂飛歌四暢瓊音流逸天朗氣清澄無氛翳日童灌精月女散花流光四合照曜諸天百和洗穢神風掃塵河海濳伏山嶽吞煙龍鱗踊躍神人普懽生死開泰福慶普隆五苦解脫九幽赦魂長徒披散上昇天堂男女懽悅長樂欣欣諸天稱慶伏聽訣言眀眞科曰生世好學棄色斷情長齋持戒晨夜誦經不倦時刻惟道自營恬和六行心柔意玄想念在法輪轉生死碩心不絶世世因縁名書金格列字九天致得乗虚白日飛行駕景策龍上登玉清明眞科曰生世妤學修行經教吞精咽炁𢘆無倦怠持齋服御吐納自練積功布德名書上清致得尸解下仙逰行五嶽後生人中更受經法爲人宗師轉輪道備克得上仙白日飛行位及髙眞明眞科曰生世錬眞服御神丹五石鎭生神室五宫功微德俠運未昇天身受滅度而骸骨芳盈億劫不休須㬰返形便更受生還爲人中智慧聰逹逆知吉凶運通徹視役使鬼神輪轉不絶克得受書爲九宫眞人明眞科曰生世妤法收鬼治病佐天正炁驅馳謹按不犯科戒施爲得法功德巍巍爲地祇所稱名上諸天死昇南宫受號上補諸天都官總領鬼神後更受生還爲人宗隨世教化洞明自然輪轉不絶位及神仙明眞科曰生世念善敬樂神明供養三寳禮受師宗命過昇天爲太上之賔後生人中得爲人尊三界所敬鬼神所稱門戸清貴天人所欣於此而學宗受大經修齋持戒廣見福田功滿德足克得神仙明眞科曰生世好道逰渉名山八節本命禮請神明燒香頋樂𢘆無暫忘施窮救厄濟度衆生敬仰師寳感應諸天五帝所舉名言青宫命過克得徑昇五嶽死無拘閉與五帝周旋後生人中身受大經神明備衛威制五方靡不回伏適意所從神丹玉芝不求自豐身生水火變化萬端因縁不絶克得受號五帝眞人明眞科曰生世勇猛平斷四方佐時正炁誅除姦凶心清身淨行合神明後死魂昇南宫受書爲四極明公或爲善爽之神後生人中通靈徹視坐致自然三宫所敬天人所宗救度厄命廣作大功因縁不絶克自得入无爲道眞明眞科曰生世敬信修奉智惠上品十戒積諸善功供養法師燒香燃燈佐天光明照耀十方施惠有德念度衆生死昇東華受號飛天位比太和十轉弟子爲衆聖策駕逰行雲中後生貴家侯王之門世世歡樂𢘆值明師修受經法建大善功諸天所敬神明所宗天人所仰坐致自然福慶巍巍難可爲勝功滿德就白日昇天明眞科曰生世𩓑樂宗奉至經供養三寳廣開法門捐棄財物散施貧民供師法服建立治堂明燈照夜九幽之中見世光明死昇天堂逍遥歡樂衣食自然後生富貴國王之門世世慶祚與善因緣又於貴盛供養殊精修齋持戒濟度衆生地司所稱名上諸天功滿德足身有光明項生圎象白日飛行上昇玄都位爲仙王明眞科曰生世奉師供養道經長齋持戒不違天科燒香燃燈照曜諸天朗徹九幽長夜光明七祖歡泰無復憂患身行善功大建福田廣度一切惠流衆生仙運未滿法應更滅死昇南宫即得更生還生貴門帝王宫中適意從容於此發𩓑精誠殊勤心不退轉施功日新三界所稱名書上清滅度運充克得飛行上昇太極位登仙公飛天神人曰長夜之府九幽玉匱明眞科品上牒十善因縁治行所得積善之功名題諸天金簡玉字神仙品中運未昇度應經輪轉死昇天堂衣飯自然逍遥無爲福慶難勝還生富貴帝王之門世世歡樂與道因縁承此之基勤修大法廣立善功情不懈怠志行日新三界所稱克得神仙若於福中不能勤心縱情退轉還入惡門施行㓙逆所作不忠犯諸非法沉輪惡根一失善階無有還縁來生諸賢善思吾言於是諸天大聖七千二百四十童子同時稱善飛天神人說十善因縁功德報應畢諸天童子歡喜作禮是時飛天神人而作頌曰勤行奉齋戒誦經制六情致得乘空飛曜景上玉清精心奉經教吐納練五神功德冠諸天輪轉成上仙苦行修生道服藥錬芝英滅度形不休體骨自香芳精苦明鬼法驅馳以効功滅度𥙷都官後生爲人宗受道敬神明供養三寳眞生世爲人尊滅度太上賔八節遊名山願念度衆生位登五帝友後生有威嚴勇猛平正心囬惡滅姦㐫三官所畏敬得爲天人宗敬信奉十戒燒香𢘆明燈功齊十轉報位得及飛天供養三寳經施散立功勤滅度昇天堂後生國王門奉師過奉神欣欣對眞經生處貴門中滅度三界庭明眞科曰无極世界男女之人生世身行不念爲善動爲惡根攻伐師主䜛擊善人殺害無道不念衆生酷虐爲行隂懷謀逆嫉妬勝巳抑絶賢明死受惡對拘閉罪魂徑入地獄長夜之中諸痛備加苦毐難勝萬劫當還生非人之道永失福門長淪罪塗往返無窮不得開度億劫無縁明眞科曰无極世界男女之人生世身行發心舉意𢘆惡爲先苦酷無度謟害忠良毀善長惡謗擊賢人死受惡對牛頭狩身晝夜考掠楚毒難言身體膿壞無復人形萬劫當還生邊夷之國有人之形無人之情永去人道長淪罪門流曵五苦八難之中不得開度億劫無還明眞科曰无極世界男女之人生世慳貪惟欲益巳不念施人割奪四軰神人爲冤啖食無厭自饒一身死受惡對爲餓鬼畜生吞火食炭𢘆不得充身體焦爛无復人形流曵塗炭苦毒難言萬劫當生六畜之中永失人道長淪異形不得開度望反甚難明眞科曰无極世界男女之人生世富貴淩虐貧賤奪人所愛離人種親分隔骨肉各在一方或六親通同媱犯骨肉斯罪深重死受破裂身形分離頭首異處魂鬼髠截銀鐺鎻械往返鐡鍼之上食息不得一日三掠乃得還生牛馬之身以報宿𡨚永失人道長淪罪根不得開度億劫異形明眞科曰无極世界男女之人生世惡逆呪詛善人呌喚神鬼質誓三官殺生媱祀禱祭邪神歌舞妖孽自稱姑郎貪啖百姓妄作無端𧷢滿罪定死受惡對魂鬼囚徒流曵三官五嶽之中一日三掠痛苦難言萬劫當得還生賤人或嬰六極無人之形沉淪罪深望反𡨋𡨋不得開度福道無縁明眞科曰无極世界男女之人生世所犯手殺君父謀反師主賊害人命恃強抑弱攻擊善人官府怨酷横罹无端枉者稱訢怨對彌天或祼露三光穢慢北君不敬天地不畏鬼神毀滅經教穢辱天眞死受惡對身入鑊湯五體煑漬無復人形百毒之汁以灌其上痛不可居苦難不任萬劫當生六畜之中或爲賤人聾盲六疾非人之形任人殺活以報宿怨福路日逺罪根日深不得開度長淪無還明眞科曰无極世界男女之人生世所行不信大法不敬神明或浮好三寳執心不專輕怠經法穢慢靈文或傳受弟子不依科年或不關天地私傳無盟自作一法違負四明或齋戒怠慢疑忽上眞其罪深重死被髠鉗循上劒樹八逹交風吹樹低昻足落刀山往返無數身體爛傷痛不可忍毒不可壬萬劫當得還生下愚之中或嬰六疾聾盲不聰長興道隔永逺學門轉輪五苦沉淪罪由不得開度長值惡根明眞科曰无極世界男女之人生世所行評詳四軰攻擊天人不慈不孝不仁不忠詈辱父母六親相殘或烹殺六畜割剔殘傷天殺狩命屠毒衆生其罪深逆死受酷對吞火食炭爲火所燒頭面焦燎通體爛壞無復人形身負鐡鑊頭戴火山痛非可忍考不可擔當得還生六畜之中任人殺活以酬昔怨永失人道長淪罪根不得開度何由得道明眞稡曰无極世界男女之人殺生滛祠叛道入邪誹笑道士訾毀眞人䡖慢三寳棄法入僞恣意無道不信宿命自作一法或掘人骸骨暴露草野其罪深重死受重對祼身無衣肉負鐡杖五體膿爛不可勝忍萬劫當得還生下愚之中癡聾無知或受邪病非復人道福路長革與罪爲縁不得開度億劫無還明眞科曰无極世界男女之人生世無道劫盜人物肆行凶逆傷害人命刀㦸剌射無所顧慮換貸不還取求無足其罪深重死受殃對身形髠截負山擔䂖食息無閑不捨晝夜塗炭辛苦非可堪忍萬劫當得還生牛馬之中以力報怨縱生人道當受殘傷刑獄幽繫流曵八難求死不得憂惱自嬰不得開度永淪罪門明眞科曰无極世界男女之人生世無道乗暗而行夜入人家掠人妻妾奪人衣服謀圖不軌傷殘男女死受重罪頭脚鎻械幽閉三光不見日月考掠楚痛非可堪忍萬劫當得還生下人之中爲人伏使任人鞭杖或聾盲無目爲人所牽以報宿怨永去善道惡根日深長淪億劫不得開度明眞科曰无極世界男女之人生世無道不念善縁三春游獵放鷹走犬張羅布網放火燒山剌射野獸殺害衆生其罪酷逆死充重殃身負鐡杖萬痛交行驅馳百極食息無寧死魂苦毒非可堪當萬劫當生野獸之身𢘆被燒斫以報宿怨緃横人道𢘆遭惡人萬劫鞭迫憂苦自嬰福路日遠罪根日臻不得開度長夜綿綿明眞科曰无極世界男女之人生世立行惡口赤舌闘亂中外評論道德毀辱天眞不信經法口是心非潜行謀惡攻擊四軰走作人物形名男女天人𡨚對罵詈無度聲言醜穢呌喚鬼神更相呪詛其罪深重死受若毒拔出其舌鐡錐剌之巨天力士鐡杖亂打無復限極身體爛壞不可爲忍萬劫當還受形爲犬𢘆使吠人任人打扑縱横人中當生邊夷非人之類百惡所歸以報宿對永失人道無有歸期流連罪門不得開度明眞科曰无極世界男女之人生世立行躭酒好色恍愡失性猖狂迷惑五情亂離去神損氣因醉貪慾爲惡不覺呌喚罵詈獨作無對打擊善人穢慢道法謗毁經教背眞入僞違負口信欺謗四輩所行失道罪有深逆死受重對魂神苦劇漣汲溟波以灌四瀆謫作江河晝夜無息鉋鐺鎻械相牽流曵冥冥長夜終無解脫萬劫當生賊人之中貧賤陋𢇻爲人所惡以報宿怨因縁之對福路曰逺罪根日結不得開度無由得出飛天神人曰長夜之府九幽玉匱明眞科律一十四條罪報之目先身積行負逆惡對善善相係惡惡相續往返相加以致不絶旣失人道轉不自覺沉淪六畜畜生之類縱還人中癡愚之極或生邊夷或嬰六疾相牽流曵萬劫無出生世無幾死日長閉一失善路永乖賢域冥冥長夜何時得脫來生男女明自厄勵建立大功以自拔贖身受十戒可免此厄善識吾言慎勿忘失於是諸天大聖眞人七千二百四十童子一時稱善飛天神人說行惡受對一十四條惡根因縁不絶之科畢諸天童子歡喜作禮於是飛天神人而作頌曰生世不善念酷虐攻師寳死受萬痛毐萬劫失人道苦酷謟忠良讒謗擊賢人生世處邊夷死受牛馬身慳貪惟欲得不念施衆生死魂爲餓鬼後生六畜形富貴淩貧賤離奪人種親身受破裂報魂鬼被髠鉗呪詛無辜人滛祀儛邪神流曵三塗中萬劫生賤身謀逆虐君父穢辱毀天眞死入鑊湯煑苦痛不得還執心不專固輕慢天寳經命過循劒樹風刀無暫停不念懷慈心酷毒害衆生死魂負鐡鑊萬劫戴火山叛道向邪神訾毀背眞人死形無衣披鐡杖不去身劫盜人財物斫刺於天民死魂受髠截生世被刑殘乘暗入人家肆意適所行死魂長幽閉不見曰月光積行不念仁逰獵捕衆生鐵杖以報怨驅馳無蹔寧凶性作口舌闘亂無踈親死受㧞舌報後生𢘆吠人好酒失本行五神並猖狂死汲溟波水灌沃四瀆中於是飛天神人偈誦善惡因縁報應以告諸天童子是時天人莫不開悟咸見命根普思宿昔所行罪源攺心自勵修奉經文宿責披散九幽肅清皆得更生善縁之中諸天童子伏受法音一時歡喜作禮而去九幽玉匱罪福縁對㧞度上品曰太上道君前進作禮上白天尊今日侍座得見童子受諸威光普照諸天福堂及无極世界地獄之中善惡報應苦樂不同善者歡泰逍遥無窮惡者塗炭流曵八難無復身形甚可哀傷如此之報受惡因縁億劫長對不識命根不審可有功德拔贖開度死魂令出長夜九幽之中身入光明更生福門如蒙慈𢚢生死荷恩亡者閒樂見世興隆富貴昌熾夀命乆長則雲䕃八遐風灑蘭林來生男女得聞法音惟願天尊分别解說授以訣言令衆見明科一切得安天尊告太上道君曰諦聽吾言善思善識對於中心晨夜存念慎勿使忘吾今爲汝解說妙音可得依用㧞贖罪魂開出長夜九幽八難宿對披散轉入信根生死歡樂世世因縁其法髙妙萬劫一傳世有賢明誓而告焉宻則福降泄則惡臻風刀之戒告於明眞違犯科律勿怨諸天於是天尊㑹飛天神人說罪福縁對㧞度上品當說經時諸天日月星宿朗曜普照九地无極世界長夜之府九幽之中長徒餓鬼責役死魂身受光明普見命根於是自悟一時廻心咸使思善念還福門五苦解脫三塗蒙遷宿對披釋地獄寧閒是時男女普聞法音預以有心悉得神仙飛天神人曰九幽玉匱㧞度死魂罪對上品常以正月三月五月七月九月十一月一年六月月一日八日十四日十五日十八日二十三日二十四日二十八日二十九日三十日一月合十日及八節日甲子日庚申日於家中庭安一長燈令髙九尺於一燈上然九燈每令光明上照九玄諸天福堂下照九地无極世界長夜之中依威儀具法開啓上請天仙地仙眞人飛仙日月星宿九宫五帝五嶽三河四海兵馬各九億萬騎三十二天監齋直事侍香金童散花玉女五帝直符各三十二人傳言奏事飛龍騎吏等一合來下監臨齋堂捻香願念應口上徹行道事竟皆還天宫晝則燒香夜則然燈使香煙不絶息露經中庭於九燈之下繞燈行道上香願念畢次向東九拜言某甲今皈命東方无極太上靈寳天尊巳得道大聖衆至眞諸君丈人九炁天君東郷諸靈官今故立齋燒香然燈願以是功德照曜諸天普爲帝王國主君官吏民受道法師父母尊親同學門人隱居山林學眞道士諸賢者蠢飛蠕動蚑行蜎息一切衆生普得免度十苦八難長居無爲普度自然某家億曽萬祖囚徒先魂開諸光明咸得解脫轉入信根去離五道開度因縁死者長樂生世蒙恩天下太平道德興𨺚今故燒香自皈依帥尊大聖衆至眞之德得道之後昇入無形與道合眞
